name: Daily Options Premium Scanner

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM Central during daylight saving time (CDT) = 12:00 UTC
    # Change to "0 13 * * 1-5" during standard time (CST) if you want exact 7:00 AM local year-round
    - cron: "0 12 * * 1-5"

jobs:
  run-daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-actions.txt ]; then
            pip install -r requirements-actions.txt
          else
            pip install requests yfinance pandas beautifulsoup4 lxml scipy python-dotenv
          fi

      - name: Download universe.csv from Google Sheets
        env:
          UNIVERSE_CSV_URL: ${{ secrets.UNIVERSE_CSV_URL }}
        run: |
          python download_universe_csv.py

      - name: Run fetch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python fetch.py

      - name: Run parser
        run: |
          python parser.py

      - name: Run calculator
        run: |
          python calculator.py

      - name: Build top-10 email payload and HTML
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python build_top10_email_report.py

      - name: Send email
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python send_top10_email.py

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-options-output
          path: |
            data/**
            reports/**
            universe.csv