name: Daily Options Email

on:
  # Mon–Fri at 13:00 UTC = 7am CST / 8am CDT
  # schedule:
  #   - cron: "0 13 * * 1-5"

  # Allow manual trigger from Actions tab for testing
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Download universe CSV
        env:
          UNIVERSE_CSV_URL: ${{ secrets.UNIVERSE_CSV_URL }}
        run: python download_universe_csv.py

      - name: Fetch options data
        run: python fetch.py

      - name: Parse fetched data
        run: python parser.py

      - name: Run calculator
        run: python calculator.py

      - name: Build email report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_top10_email_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: options-report-${{ github.run_id }}
          path: |
            reports/top10_email.html
            reports/top10_email_payload.json
            reports/top10_email_subject.txt
            reports/top10_email_debug.json
          retention-days: 7

      # Send step disabled — uncomment when ready to re-enable
      # - name: Send email
      #   env:
      #     GMAIL_USERNAME:     ${{ secrets.GMAIL_USERNAME }}
      #     GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      #   run: python send_top10_email.py