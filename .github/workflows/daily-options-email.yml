name: Daily Options Premium Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '15 12 * * 1-5'

jobs:
  run-daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Download universe.csv from Google Sheets
        env:
          UNIVERSE_CSV_URL: ${{ secrets.UNIVERSE_CSV_URL }}
        run: |
          python download_universe_csv.py

      - name: Run fetch
        run: |
          python fetch.py

      - name: Run parser
        run: |
          python parser.py

      - name: Run calculator
        run: |
          python calculator.py

      - name: Build top-10 email report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python build_top10_email_report.py

      - name: Send email
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python send_top10_email.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-options-output
          path: |
            data/**
            reports/**
